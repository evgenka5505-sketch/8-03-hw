---
- hosts: zabbix
  become: yes
  tasks:
    - name: Download Zabbix repo
      get_url:
        url: https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest_7.0+ubuntu22.04_all.deb
        dest: /tmp/zabbix-release.deb

    - name: Install Zabbix repo
      apt:
        deb: /tmp/zabbix-release.deb

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Zabbix server, frontend, agent
      apt:
        name:
          - zabbix-server-pgsql
          - zabbix-frontend-php
          - php8.1-pgsql
          - zabbix-apache-conf
          - zabbix-sql-scripts
          - zabbix-agent
          - postgresql
        state: present

    - name: Start PostgreSQL
      service:
        name: postgresql
        state: started
        enabled: yes

    - name: Create zabbix DB user and database
      shell: |
        sudo -u postgres psql -c "CREATE USER zabbix WITH PASSWORD 'zabbix123';" 2>/dev/null || true
        sudo -u postgres psql -c "CREATE DATABASE zabbix OWNER zabbix;" 2>/dev/null || true

    - name: Import Zabbix schema
      shell: |
        export PGPASSWORD='zabbix123'
        zcat /usr/share/zabbix-sql-scripts/postgresql/server.sql.gz | psql -h 127.0.0.1 -U zabbix zabbix 2>&1 | tail -1
      args:
        creates: /etc/zabbix/.schema_imported

    - name: Mark schema imported
      file:
        path: /etc/zabbix/.schema_imported
        state: touch

    - name: Configure Zabbix server DB password
      lineinfile:
        path: /etc/zabbix/zabbix_server.conf
        regexp: '^# DBPassword='
        line: 'DBPassword=zabbix123'

    - name: Restart Zabbix server
      service:
        name: zabbix-server
        state: restarted
        enabled: yes

    - name: Restart Zabbix agent
      service:
        name: zabbix-agent
        state: restarted
        enabled: yes

    - name: Restart Apache
      service:
        name: apache2
        state: restarted
        enabled: yes
